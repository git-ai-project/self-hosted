{{- $backend := include "gitai.storageBackend" . -}}
{{- $emailProvider := include "gitai.emailProvider" . -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gitai.secretName" . }}
  labels:
    {{- include "gitai.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  WORKER_JWT_SECRET: {{ .Values.secrets.workerJwtSecret | quote }}
  WEB_INTERNAL_API_KEY: {{ .Values.secrets.webInternalApiKey | quote }}
  SCM_WEBHOOK_SECRET_KEY: {{ .Values.secrets.scmWebhookSecretKey | quote }}
  LICENSE_KEY: {{ .Values.secrets.licenseKey | quote }}
  {{- if eq $emailProvider "resend" }}
  RESEND_API_KEY: {{ include "gitai.resendApiKey" . | quote }}
  {{- end }}
  {{- if and (eq $emailProvider "smtp") .Values.email.smtp.username }}
  SMTP_PASSWORD: {{ .Values.email.smtp.password | quote }}
  {{- end }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:5432/%s" (.Values.postgresql.auth.username | urlquery) (.Values.postgresql.auth.password | urlquery) (include "gitai.postgresqlHost" .) (.Values.postgresql.auth.database | urlquery) | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379" (.Values.valkey.auth.password | urlquery) (include "gitai.valkeyHost" .) | quote }}
  SCM_APPS_CONFIG: |-
{{ .Values.secrets.scmAppsConfigJson | nindent 4 }}
  {{- if eq $backend "azure" }}
  {{ .Values.storage.azure.connectionStringSecretKey }}: {{ .Values.storage.azure.connectionString | quote }}
  {{- end }}
{{- end }}
