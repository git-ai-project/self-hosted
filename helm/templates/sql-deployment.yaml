{{- if .Values.sqlApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitai.sqlServiceName" . }}
  labels:
    {{- include "gitai.labels" . | nindent 4 }}
    app.kubernetes.io/component: sql-api
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gitai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sql-api
  template:
    metadata:
      labels:
        {{- include "gitai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sql-api
    spec:
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: sql-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: sql
              containerPort: {{ .Values.sqlApi.port }}
          env:
            - name: SQL_API_ONLY
              value: "true"
            - name: SQL_API_ENABLED
              value: "true"
            - name: SQL_API_PORT
              value: {{ .Values.sqlApi.port | quote }}
            - name: SQL_API_USER
              value: {{ .Values.sqlApi.username | quote }}
            - name: SQL_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gitai.secretName" . }}
                  key: SQL_API_PASSWORD
            - name: CLICKHOUSE_HTTP_URL
              value: {{ printf "http://%s:%v" (include "gitai.clickhouseServiceName" .) .Values.clickhouse.service.httpPort | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.auth.database | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gitai.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
