{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gitai.clickhouseServiceName" . }}-config
  labels:
    {{- include "gitai.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  logging.xml: |
    <clickhouse>
      {{- if .Values.clickhouse.listenHost }}
      <listen_host>{{ .Values.clickhouse.listenHost }}</listen_host>
      {{- end }}
      <!-- Disable most system logs to save storage -->
      <!-- ENGINE = Null keeps tables queryable but discards all writes to disk -->
      <query_thread_log replace="1">
        <engine>ENGINE = Null</engine>
      </query_thread_log>
      <part_log replace="1">
        <engine>ENGINE = Null</engine>
      </part_log>
      <trace_log replace="1">
        <engine>ENGINE = Null</engine>
      </trace_log>
      <metric_log replace="1">
        <engine>ENGINE = Null</engine>
      </metric_log>
      <asynchronous_metric_log replace="1">
        <engine>ENGINE = Null</engine>
      </asynchronous_metric_log>
      <text_log replace="1">
        <engine>ENGINE = Null</engine>
      </text_log>
      <session_log replace="1">
        <engine>ENGINE = Null</engine>
      </session_log>
      <opentelemetry_span_log replace="1">
        <engine>ENGINE = Null</engine>
      </opentelemetry_span_log>
      <processors_profile_log replace="1">
        <engine>ENGINE = Null</engine>
      </processors_profile_log>
      <asynchronous_insert_log replace="1">
        <engine>ENGINE = Null</engine>
      </asynchronous_insert_log>
      <error_log replace="1">
        <engine>ENGINE = Null</engine>
      </error_log>

      {{- if .Values.clickhouse.systemLogs.queryLog.enabled }}
      <!-- Keep query_log but with short TTL -->
      <query_log>
        <database>system</database>
        <table>query_log</table>
        <partition_by>toYYYYMM(event_date)</partition_by>
        <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogs.queryLog.ttlDays }} DAY</ttl>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
      </query_log>
      {{- else }}
      <query_log remove="1"/>
      {{- end }}

      {{- if .Values.clickhouse.logging.structuredStdout.enabled }}
      <!-- K8s-friendly logger: JSON to stdout, file logging disabled. -->
      <logger>
        <level>{{ .Values.clickhouse.logging.structuredStdout.level }}</level>
        <format>json</format>
        <json>
          <date>date</date>
          <time>time</time>
          <thread_id>thread_id</thread_id>
          <level>level</level>
          <query_id>query_id</query_id>
          <logger_name>logger_name</logger_name>
          <message>message</message>
          <source_file>source_file</source_file>
          <source_line>source_line</source_line>
        </json>
        <log>/dev/null</log>
        <errorlog>/dev/null</errorlog>
        <console>1</console>
      </logger>
      {{- end }}
    </clickhouse>
{{- end }}
