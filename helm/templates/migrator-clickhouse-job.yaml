{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gitai.fullname" . }}-migrator-clickhouse
  labels:
    {{- include "gitai.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrator
    app.kubernetes.io/part: clickhouse
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-9"
    helm.sh/hook-delete-policy: {{ .Values.migrations.hookDeletePolicy | quote }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "gitai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrator
        app.kubernetes.io/part: clickhouse
    spec:
      restartPolicy: Never
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: migrator-clickhouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - /app/scripts/migrate-clickhouse.sh
          env:
            - name: CLICKHOUSE_HOST
              value: {{ include "gitai.clickhouseServiceName" . | quote }}
            - name: CLICKHOUSE_PORT
              value: {{ .Values.clickhouse.service.nativePort | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gitai.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.auth.database | quote }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
