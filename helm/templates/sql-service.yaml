{{- if .Values.sqlApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitai.sqlServiceName" . }}
  labels:
    {{- include "gitai.labels" . | nindent 4 }}
    app.kubernetes.io/component: sql
spec:
  type: ClusterIP
  selector:
    {{- include "gitai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: sql-api
  ports:
    - name: sql
      port: {{ .Values.sqlApi.port }}
      targetPort: sql
{{- end }}
